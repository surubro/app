<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>phone sms..</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #eaeff1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .hidden { display: none !important; }

    /* Login UI */
    #loginScreen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; background: white; text-align: center; }
    #loginScreen input { padding: 12px; font-size: 16px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; width: 260px; outline: none; }
    #loginScreen button { padding: 12px 24px; font-size: 15px; background: #007bff; border: none; color: white; border-radius: 8px; cursor: pointer; }

    /* Chat UI */
    #chatUI { display: flex; flex-direction: column; height: 100%; }
    .chat-box { flex: 1; overflow-y: auto; padding: 15px; background: #f0f2f5; display: flex; flex-direction: column; }
    
    .message { position: relative; padding: 10px 14px; margin: 6px 0; border-radius: 12px; max-width: 80%; word-wrap: break-word; font-size: 15px; cursor: pointer; user-select: none; }
    .message:active { opacity: 0.7; }
    .sent { align-self: flex-end; background: #dcf8c6; color: #303030; border-bottom-right-radius: 2px; }
    .received { align-self: flex-start; background: #ffffff; color: #303030; border-bottom-left-radius: 2px; border: 1px solid #e0e0e0; }

    /* Footer / Input Area */
    .input-container { display: flex; align-items: center; padding: 10px 15px; background: #fff; border-top: 1px solid #ddd; }
    .input-container textarea { flex: 1; resize: none; padding: 12px 16px; font-size: 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; height: 44px; }
    
    .btn-icon { background: #007bff; border: none; color: white; margin-left: 8px; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    #logoutBtn { background: #6c757d; color: white; border: none; padding: 10px 14px; margin-left: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>

  <div id="loginScreen">
    <h2>Welcome Back</h2>
    <input type="email" id="loginEmail" placeholder="Email Address">
    <input type="password" id="loginPassword" placeholder="Password">
    <button id="loginBtn">Sign In</button>
  </div>

  <div id="chatUI" class="hidden">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-container">
      <textarea id="messageInput" placeholder="Message..."></textarea>
      <button class="btn-icon" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
    authDomain: "striped-acrobat-342207.firebaseapp.com",
    databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
    projectId: "striped-acrobat-342207",
    storageBucket: "striped-acrobat-342207.appspot.com",
    messagingSenderId: "367114842706",
    appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  const loginScreen = document.getElementById("loginScreen");
  const chatUI = document.getElementById("chatUI");
  const chatBox = document.getElementById("chatBox");
  const messageInput = document.getElementById("messageInput");

  const saveLocal = (data) => localStorage.setItem("phonesms", JSON.stringify(data));
  const loadLocal = () => JSON.parse(localStorage.getItem("phonesms") || "{}");

  function renderMessages(dataObj, uid) {
    chatBox.innerHTML = "";
    Object.keys(dataObj).forEach(key => {
      const msg = dataObj[key];
      const msgDiv = document.createElement("div");
      msgDiv.className = `message ${msg.uid === uid ? 'sent' : 'received'}`;
      msgDiv.textContent = msg.text;
      
      // Double click to delete message
      msgDiv.ondblclick = () => {
        if (confirm("Delete this message?")) {
          remove(ref(db, `phonesms/${key}`));
        }
      };
      
      chatBox.appendChild(msgDiv);
    });
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function sendMessage() {
    const text = messageInput.value.trim();
    if (text && auth.currentUser) {
      push(ref(db, "phonesms"), {
        text: text,
        uid: auth.currentUser.uid,
        time: Date.now()
      });
      messageInput.value = "";
    }
  }

  document.getElementById("loginBtn").onclick = () => {
    signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value).catch(err => alert(err.message));
  };

  document.getElementById("logoutBtn").onclick = () => {
    signOut(auth).then(() => {
      localStorage.removeItem("phonesms");
      location.reload();
    });
  };

  document.getElementById("sendBtn").onclick = sendMessage;
  messageInput.onkeydown = (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  // Load local cache immediately
  const cached = loadLocal();
  if (Object.keys(cached).length > 0) {
    renderMessages(cached, null);
  }

  onAuthStateChanged(auth, user => {
    if (user) {
      loginScreen.classList.add("hidden");
      chatUI.classList.remove("hidden");

      onValue(ref(db, "phonesms"), (snapshot) => {
        const data = snapshot.val() || {};
        saveLocal(data); 
        renderMessages(data, user.uid);
      });
    } else {
      loginScreen.classList.remove("hidden");
      chatUI.classList.add("hidden");
    }
  });
</script>
</body>
</html>
