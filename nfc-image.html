<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Pay Pro</title>
    <style>
        :root {
            --google-blue: #4285F4;
            --bg-color: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Google Sans', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
        }

        /* Increased Card Size */
        .card {
            width: 360px; /* Increased from 320px */
            height: 226px; /* Increased from 200px */
            border-radius: 20px;
            position: relative;
            background: #111;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: transform 0.2s ease;
        }

        #card-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            display: none;
        }

        .shimmer {
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            z-index: 1;
            animation: shine 5s infinite;
        }

        @keyframes shine { 0% { left: -150%; } 20% { left: 150%; } 100% { left: 150%; } }

        .card-info { z-index: 2; }
        .card-number { font-size: 1.2rem; letter-spacing: 2px; }

        /* Larger NFC Transmission Area */
        #nfc-active {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 60px;
        }

        .nfc-rings {
            position: relative;
            width: 120px; /* Increased from 80px */
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ring {
            position: absolute;
            border: 3px solid var(--google-blue);
            border-radius: 50%;
            animation: sonar 2.5s infinite cubic-bezier(0.36, 0.11, 0.89, 0.32);
            opacity: 0;
        }

        .ring:nth-child(2) { animation-delay: 0.8s; }
        .ring:nth-child(3) { animation-delay: 1.6s; }

        @keyframes sonar {
            0% { width: 30px; height: 30px; opacity: 1; }
            100% { width: 150px; height: 150px; opacity: 0; }
        }

        .nfc-icon-svg {
            width: 45px; /* Increased from 30px */
            height: 45px;
            fill: var(--google-blue);
            z-index: 5;
        }

        #upload-area { margin-top: 40px; text-align: center; }
        .custom-btn {
            background: #fff;
            color: #000;
            padding: 14px 30px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <img id="card-img" src="">
        <div class="shimmer"></div>
        <div class="card-info">
            <div class="card-number">•••• 9902</div>
            <div style="font-size: 0.8rem; opacity: 0.6; margin-top: 5px;">GOOGLE PAY</div>
        </div>
    </div>

    <div id="upload-area">
        <input type="file" id="file-input" hidden accept="image/*">
        <button class="custom-btn" onclick="document.getElementById('file-input').click()">CHOOSE CARD DESIGN</button>
    </div>

    <div id="nfc-active">
        <div class="nfc-rings">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
            <svg class="nfc-icon-svg" viewBox="0 0 24 24">
                <path d="M20,2H4C2.9,2,2,2.9,2,4v16c0,1.1,0.9,2,2,2h16c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z M20,20H4V4h16V20z M18,6h-5c-1.1,0-2,0.9-2,2v2.28c-0.6,0.35-1,1-1,1.72c0,1.1,0.9,2,2,2s2-0.9,2-2c0-0.72-0.4-1.38-1-1.72V8h3V6z"/>
            </svg>
        </div>
        <div style="color:var(--google-blue); margin-top: 30px; font-weight: 500;">READY TO PAY</div>
    </div>

    <div class="hint">DOUBLE TAP ANYWHERE FOR FULLSCREEN</div>

    <script>
        const fileInput = document.getElementById('file-input');
        const cardImg = document.getElementById('card-img');
        const uploadArea = document.getElementById('upload-area');
        const nfcActive = document.getElementById('nfc-active');

        // Handle Image Upload
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    cardImg.src = event.target.result;
                    cardImg.style.display = 'block';
                    uploadArea.style.display = 'none';
                    nfcActive.style.display = 'flex';
                }
                reader.readAsDataURL(file);
            }
        });

        // Double Tap to Toggle Fullscreen
        let lastTap = 0;
        document.addEventListener('touchend', function(e) {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                toggleFullScreen();
                e.preventDefault();
            }
            lastTap = currentTime;
        });

        // Double Click for Desktop
        document.addEventListener('dblclick', toggleFullScreen);

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
