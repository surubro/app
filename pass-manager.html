<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure Vault Pro</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --warning: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f7f6; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; color: white; border: none; cursor: pointer; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); width: auto; font-size: 12px; }
        .btn-warning { background: var(--warning); color: #212529; width: auto; font-size: 12px; }

        /* CRITICAL FIX: Ensure hidden items are truly hidden */
        .hidden { display: none !important; }

        .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .entry-card { background: #fff; border: 1px solid #eef; padding: 15px; margin-top: 15px; border-radius: 12px; }
        
        /* Modal Styling */
        #modalOverlay { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; 
        }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection">
        <h2>Vault Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Master Password">
        <button id="authBtn" class="btn btn-primary">Login</button>
        <p style="text-align:center; cursor:pointer;" id="toggleAuth">New? Create Account</p>
    </div>

    <div id="appSection" class="hidden">
        <div style="display:flex; justify-content: space-between;">
            <h3>Add New</h3>
            <button id="logoutBtn" style="width:auto; background:none; border:none; color:blue; cursor:pointer;">Logout</button>
        </div>
        <input type="text" id="accName" placeholder="Account Name">
        <div class="field-group">
            <input type="text" id="accUser" placeholder="Username">
            <input type="password" id="accPass" placeholder="Password">
        </div>
        <button id="saveBtn" class="btn btn-primary">Save to Vault</button>
        <div id="passwordList"></div>
    </div>
</div>

<div id="modalOverlay" class="hidden">
    <div class="modal-content">
        <h3>Edit Entry</h3>
        <input type="hidden" id="editId">
        <input type="text" id="editName" placeholder="Account Name">
        <div class="field-group">
            <input type="text" id="editUser" placeholder="Username">
            <input type="text" id="editPass" placeholder="Password">
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button id="updateBtn" class="btn btn-primary">Update</button>
            <button id="closeModal" class="btn" style="background:#6c757d; color:white;">Cancel</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
        authDomain: "striped-acrobat-342207.firebaseapp.com",
        databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
        projectId: "striped-acrobat-342207",
        storageBucket: "striped-acrobat-342207.appspot.com",
        messagingSenderId: "367114842706",
        appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;

    // Auth & UI Toggling
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            loadData(user.uid);
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('passwordList').innerHTML = '';
        }
    });

    // Save Logic
    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('accName').value;
        if (name && currentUser) {
            push(ref(db, `users/${currentUser.uid}`), {
                name,
                user: document.getElementById('accUser').value,
                pass: document.getElementById('accPass').value
            }).then(() => {
                document.getElementById('accName').value = '';
                document.getElementById('accUser').value = '';
                document.getElementById('accPass').value = '';
            });
        }
    };

    function loadData(uid) {
        onValue(ref(db, `users/${uid}`), (snapshot) => {
            const list = document.getElementById('passwordList');
            list.innerHTML = '';
            const data = snapshot.val();
            for (let id in data) {
                const item = data[id];
                const card = document.createElement('div');
                card.className = 'entry-card';
                card.innerHTML = `
                    <div style="font-weight:bold; color:#007bff;">${item.name}</div>
                    <div style="font-size:0.9em;">User: ${item.user}</div>
                    <button class="btn btn-warning" onclick="window.openEditModal('${id}')">Edit</button>
                    <button class="btn btn-danger" onclick="window.deleteItem('${id}')">Delete</button>
                `;
                list.appendChild(card);
            }
        });
    }

    // Modal Controls
    window.openEditModal = (id) => {
        onValue(ref(db, `users/${currentUser.uid}/${id}`), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = data.name;
            document.getElementById('editUser').value = data.user;
            document.getElementById('editPass').value = data.pass;
            // Only show modal AFTER data is loaded
            document.getElementById('modalOverlay').classList.remove('hidden');
        }, { onlyOnce: true });
    };

    document.getElementById('closeModal').onclick = () => {
        document.getElementById('modalOverlay').classList.add('hidden');
    };

    document.getElementById('updateBtn').onclick = () => {
        const id = document.getElementById('editId').value;
        update(ref(db, `users/${currentUser.uid}/${id}`), {
            name: document.getElementById('editName').value,
            user: document.getElementById('editUser').value,
            pass: document.getElementById('editPass').value
        }).then(() => {
            document.getElementById('modalOverlay').classList.add('hidden');
        });
    };

    window.deleteItem = (id) => {
        if(confirm("Delete this?")) remove(ref(db, `users/${currentUser.uid}/${id}`));
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);
    
    // Auth Toggles (Simplified)
    let loginMode = true;
    document.getElementById('toggleAuth').onclick = () => {
        loginMode = !loginMode;
        document.getElementById('authBtn').innerText = loginMode ? "Login" : "Sign Up";
    };
    document.getElementById('authBtn').onclick = () => {
        const e = document.getElementById('email').value;
        const p = document.getElementById('authPassword').value;
        if(loginMode) signInWithEmailAndPassword(auth, e, p);
        else createUserWithEmailAndPassword(auth, e, p);
    };
</script>
</body>
</html>
