<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Cloud Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .input-box { display: flex; gap: 10px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; flex: 1; }
        button { cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
        .btn-add { background: #28a745; color: white; width: 100%; padding: 12px; margin-bottom: 20px; }
        .item { display: flex; justify-content: space-between; background: #eee; padding: 10px; margin-bottom: 5px; border-radius: 5px; align-items: center; }
        .btn-del { background: #dc3545; color: white; padding: 5px 8px; font-size: 12px; }
        .results { background: #222; color: #00ff00; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px dashed #444; padding-bottom: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">Bill Tracker</h2>

    <div id="authDiv">
        <input type="email" id="email" placeholder="Email" style="width:94%; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Password" style="width:94%; margin-bottom:10px;">
        <button onclick="login()" style="width:100%; padding:10px; background:#007bff; color:white;">Login to Sync</button>
    </div>

    <div id="mainDiv" class="hidden">
        <div class="input-box">
            <input type="text" id="name" placeholder="Name (Phone 1, DTH)">
            <input type="number" id="amt" placeholder="Monthly ₹">
        </div>
        <button class="btn-add" id="addBtn">Add Entry</button>

        <div id="list"></div>

        <div class="results">
            <div class="res-row"><span>Daily (30 days):</span> <span id="dayTot">₹0</span></div>
            <div class="res-row"><span>Total Monthly:</span> <span id="monTot">₹0</span></div>
            <div class="res-row"><span>Total Yearly:</span> <span id="yearTot">₹0</span></div>
        </div>
        <button onclick="logout()" style="margin-top:10px; background:none; color:red; font-size:12px;">Logout</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxbzsSi-dsFPPGDeogz2SaEsW_3OKu-QU",
        authDomain: "striped-acrobat-342207.firebaseapp.com",
        databaseURL: "https://striped-acrobat-342207-default-rtdb.firebaseio.com",
        projectId: "striped-acrobat-342207",
        storageBucket: "striped-acrobat-342207.appspot.com",
        messagingSenderId: "367114842706",
        appId: "1:367114842706:web:0f6d504163ed3c72ed658b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.login = () => {
        const e = document.getElementById("email").value;
        const p = document.getElementById("pass").value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("authDiv").classList.add("hidden");
            document.getElementById("mainDiv").classList.remove("hidden");
            startApp(user.uid);
        } else {
            document.getElementById("authDiv").classList.remove("hidden");
            document.getElementById("mainDiv").classList.add("hidden");
        }
    });

    function startApp(uid) {
        const dataRef = ref(db, `user_expenses/${uid}`);

        // Add
        document.getElementById("addBtn").onclick = () => {
            const n = document.getElementById("name").value;
            const a = document.getElementById("amt").value;
            if(n && a) {
                push(dataRef, { name: n, monthly: parseFloat(a) });
                document.getElementById("name").value = "";
                document.getElementById("amt").value = "";
            }
        };

        // Sync & Calculate
        onValue(dataRef, (snap) => {
            const list = document.getElementById("list");
            list.innerHTML = "";
            let total = 0;
            const data = snap.val();

            if(data) {
                Object.keys(data).forEach(id => {
                    const item = data[id];
                    total += item.monthly;
                    list.innerHTML += `
                        <div class="item">
                            <span>${item.name}: <b>₹${item.monthly}</b></span>
                            <button class="btn-del" onclick="del('${id}')">Del</button>
                        </div>
                    `;
                });
            }

            // Calculations
            document.getElementById("monTot").innerText = "₹" + total.toFixed(2);
            document.getElementById("dayTot").innerText = "₹" + (total / 30).toFixed(2);
            document.getElementById("yearTot").innerText = "₹" + (total * 12).toFixed(2);

            window.del = (id) => remove(ref(db, `user_expenses/${uid}/${id}`));
        });
    }
</script>
</body>
</html>
